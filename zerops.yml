zerops:
  - setup: api
    build:
      base: alpine/ruby@3.4
      buildCommands:
        - bundle install
      deployFiles:
        - .
    run:
      base: alpine/ruby@3.4
      start: bundle exec rails server -b 0.0.0.0 -p 3000

  - setup: front
    build:
      base: alpine/nodejs@24
      buildCommands:
        - npm install
        - npm run build
      deployFiles:
        - .next
        - public
        - package.json
        - node_modules
    run:
      base: alpine/nodejs@24
      start: npm run start
