zerops:
  - setup: api
    build:
      base: alpine/ruby@3.4
      buildCommands:
        - cd api && bundle install
      deployFiles:
        - api
    run:
      base: alpine/ruby@3.4
      start: cd api && bundle exec rails server -b 0.0.0.0 -p 3000

  - setup: front
    build:
      base: alpine/nodejs@24
      buildCommands:
        - cd front && npm install
        - cd front && npm run build
      deployFiles:
        - front/.next
        - front/public
        - front/package.json
        - front/node_modules
    run:
      base: alpine/nodejs@24
      start: cd front && npm run start
